<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Laboratory - Pathfinding</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="lab-container">
        <div class="header-with-nav"
            style="display: flex; justify-content: center; align-items: center; gap: 20px; flex-direction: column;">
            <h1>Algorithm Laboratory: Pathfinding</h1>
            <a href="index.html" class="nav-button"
                style="text-decoration: none; background: linear-gradient(135deg, #3b82f6, #2563eb); padding: 10px 24px; font-size: 1rem; border-radius: 50px; color: white; display:flex; align-items: center; gap:8px;">Switch
                to Sorting</a>
        </div>

        <div class="controls pathfinding-controls">
            <div class="action-buttons">
                <button onclick="startPathfinding()">Start Search</button>
                <button onclick="generateMaze()">Generate Maze</button>
                <button onclick="clearGrid()">Clear Entire Grid</button>
                <button onclick="clearPath()">Clear Path Only</button>
            </div>

            <div class="slider-group">
                <div class="slider-item">
                    <label>Grid Size: <span id="grid-val">25x25</span></label>
                    <input type="range" id="grid-slider" min="10" max="40" value="25" step="1"
                        oninput="updateGridSize()">
                </div>

                <div class="slider-item">
                    <label>Speed: <span id="speed-val">1x</span></label>
                    <input type="range" id="speed-slider" min="0.5" max="3" step="0.5" value="1"
                        oninput="updateSpeedDisplay()">
                </div>
            </div>

            <div class="algo-selection" style="display: flex; gap: 10px;">
                <select id="algo-selector" class="algo-selector">
                    <option value="dijkstra">Dijkstra's Algorithm</option>
                    <option value="astar">A* Search</option>
                    <option value="bellmanford">Bellman-Ford</option>
                </select>
                <select id="maze-selector" class="algo-selector">
                    <option value="random">Random Walls (30%)</option>
                    <option value="recursive">Recursive Division</option>
                    <option value="stair">Stair Pattern</option>
                </select>
            </div>
        </div>

        <div class="pathfinding-floor" style="margin-top: 20px;">
            <div class="legend"
                style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                <div class="legend-item" style="display: flex; align-items: center; gap: 8px;">
                    <div class="node node-start legend-node" style="width: 25px; height: 25px;"></div> Start Node
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 8px;">
                    <div class="node node-end legend-node" style="width: 25px; height: 25px;"></div> Target Node
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 8px;">
                    <div class="node node-wall legend-node" style="width: 25px; height: 25px;"></div> Wall Node
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 8px;">
                    <div class="node node-visited legend-node" style="width: 25px; height: 25px;"></div> Visited Node
                </div>
                <div class="legend-item" style="display: flex; align-items: center; gap: 8px;">
                    <div class="node node-path legend-node" style="width: 25px; height: 25px;"></div> Shortest Path
                </div>
            </div>
            <p class="instructions" style="color: var(--text-secondary); margin-bottom: 15px;">Click and drag on empty
                nodes to add/remove walls. Drag Start or Target nodes to move them.</p>
            <div id="grid-container" class="grid-container"></div>
            <div class="algo-info-card pathfinding-info-card" id="pathfinding-info">
                <!-- Dynamic pathfinding info goes here -->
            </div>
        </div>
    </div>

    <script src="js/pathfindingData.js"></script>
    <script src="js/pathfinding.js"></script>
</body>

</html>
