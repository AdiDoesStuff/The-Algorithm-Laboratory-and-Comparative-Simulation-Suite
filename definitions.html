<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glossary & Definitions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="definitions.css">
</head>
<body class="definitions-body">

    <!-- Page Transition Overlay -->
    <div id="page-transition" class="page-transition"></div>

    <header class="def-header">
        <div class="header-left">
            <button onclick="goBack()" class="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Lab
            </button>
            <h1>Glossary & Definitions</h1>
        </div>
        <div class="header-right">
            <div class="search-container">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search technical terms...">
            </div>
        </div>
    </header>

    <main class="def-main">
        <div id="definitions-grid" class="glossary-grid">
            <!-- Cards injected by JS -->
        </div>
    </main>

    <!-- Definition Popup Modal -->
    <div id="definition-modal" class="modal-overlay hidden" onclick="closeModalOnOutsideClick(event)">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <h2 id="modal-title" class="modal-title">Term</h2>
            <div class="modal-divider"></div>
            <p id="modal-def" class="modal-def">Definition goes here.</p>
        </div>
    </div>

    <script src="definitions.js"></script>
</body>
</html>
