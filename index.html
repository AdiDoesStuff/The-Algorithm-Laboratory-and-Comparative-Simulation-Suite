<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algorithm Laboratory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lab-container">
        <h1>Algorithm Laboratory: Sorting Duel</h1>
        
        <div class="controls">
            <button onclick="startComparison()">Start Race</button>
            <button id="pause-btn" onclick="togglePause()">Pause</button>
            <button onclick="resetLab()">Reset</button>
        </div>
        
        <div class="duel-floor">
    <div class="arena" id="arena-left">
        <select id="algo-left" class="algo-selector">
            <option value="bubble">Bubble Sort</option>
            <option value="selection">Selection Sort</option>
            <option value="insertion">Insertion Sort</option>
            <option value="quick">Quick Sort</option>
            <option value="merge">Merge Sort</option>
            <option value="heap">Heap Sort</option>
            <option value="bogo">Bogo Sort</option>
            <option value="optbogo">Optimized Bogo</option>
        </select>
        <div id="visualizer-left" class="bar-container"></div>
        <p>Comparisons: <span id="count-left">0</span></p>
    </div>
    
    <div class="arena" id="arena-right">
        <select id="algo-right" class="algo-selector">
            <option value="bubble">Bubble Sort</option>
            <option value="selection" selected>Selection Sort</option> <option value="insertion">Insertion Sort</option>
            <option value="quick">Quick Sort</option>
            <option value="merge">Merge Sort</option>
            <option value="heap">Heap Sort</option>
            <option value="bogo">Bogo Sort</option>
            <option value="optbogo">Optimized Bogo</option>
        </select>
        <div id="visualizer-right" class="bar-container"></div>
        <p>Comparisons: <span id="count-right">0</span></p>
    </div>
</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
